<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#061626">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icon-192.png">
<title>NeoDex – HeartGold Generations 2.0</title>
<style>
:root{--bg:#061626;--panel:#0b263f;--panel2:#102f4d;--text:#f7fafc;--muted:#bac9d8;--gold:#efc566;--line:#294a68;--light:#f4f7fb;--ink:#10233e}
*{box-sizing:border-box}html,body{margin:0;min-height:100%;background:var(--bg);font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text",system-ui,sans-serif}
button,input,select{font:inherit}
#home{min-height:100vh;display:flex;justify-content:center;background:#061626}
.master{position:relative;width:min(100vw,768px);aspect-ratio:768/1536;background:url('master-home.jpg') top center/100% auto no-repeat}
.hotspot{position:absolute;border:0;background:transparent;cursor:pointer;border-radius:24px;-webkit-tap-highlight-color:transparent}
.hotspot:active{background:rgba(255,255,255,.05)}
#settingsHot{left:85.5%;top:6.2%;width:11%;height:6.5%;border-radius:50%}
#dexHot{left:3.2%;top:58.2%;width:46.6%;height:14.8%}
#routeHot{left:50.8%;top:58.2%;width:46.2%;height:14.8%}
#caughtHot{left:3.2%;top:74.2%;width:46.6%;height:13.3%}
#favHot{left:50.8%;top:74.2%;width:46.2%;height:13.3%}

#dexView{display:none;min-height:100vh;background:#f2f6fa;color:var(--ink)}
.dexTop{position:sticky;top:0;z-index:5;background:rgba(242,246,250,.92);backdrop-filter:blur(18px);padding:max(14px,env(safe-area-inset-top)) 16px 12px;border-bottom:1px solid #d9e3ec}
.dexBrand{display:flex;align-items:center;justify-content:space-between}.dexBrand h1{margin:0;font-size:24px}.dexBrand small{display:block;color:#987225;margin-top:3px}
.back{border:0;background:transparent;color:#0b4b7b;font-weight:750;font-size:16px;padding:8px 0}
.dexBody{padding:15px 15px calc(40px + env(safe-area-inset-bottom));max-width:900px;margin:auto}
.search{width:100%;border:1px solid #d8e2eb;background:#fff;color:#10233e;border-radius:16px;padding:14px 15px;font-size:16px}
.filters{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin:10px 0 13px}
select{border:1px solid #d8e2eb;background:#fff;color:#10233e;border-radius:14px;padding:12px}
.grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px}
@media(min-width:720px){.grid{grid-template-columns:repeat(4,minmax(0,1fr))}}
.poke{position:relative;background:#fff;border:1px solid #dce5ed;border-radius:20px;padding:11px;min-height:174px;box-shadow:0 6px 20px rgba(15,39,64,.06)}
.poke img{display:block;width:94px;height:94px;object-fit:contain;margin:auto}.num{font-size:10px;color:#758397}.de{font-weight:780;font-size:17px}.en{font-size:12px;color:#758397;margin-top:2px}
.star{position:absolute;right:6px;top:6px;border:0;background:#f3f6f9;width:36px;height:36px;border-radius:50%;font-size:22px;color:#a2acb8}.star.on{color:#d7a941}
.chips{display:flex;gap:5px;flex-wrap:wrap;margin-top:7px}.chip{font-size:10px;font-weight:700;border-radius:99px;padding:4px 7px;background:#f2f5f8}.changed{background:#fff0d8;color:#8f5b00}
.empty{text-align:center;color:#758397;padding:50px 10px}
dialog{width:min(720px,100%);height:min(91vh,920px);max-width:none;margin:auto 0 0;border:0;border-radius:26px 26px 0 0;padding:0;background:#f2f6fa;color:#10233e}
dialog::backdrop{background:#0009}.sheetHead{position:sticky;top:0;z-index:3;display:flex;justify-content:space-between;align-items:center;padding:13px 15px;background:rgba(242,246,250,.92);backdrop-filter:blur(18px);border-bottom:1px solid #dce5ed}.close{width:38px;height:38px;border:0;border-radius:50%;background:#fff;font-size:20px}
.sheet{padding:15px 15px 38px}.detailHero{text-align:center}.detailHero img{width:185px;height:185px;object-fit:contain}.detailHero h2{font-size:30px;margin:0}.sub{color:#758397;margin-top:4px}
.card{background:#fff;border:1px solid #dce5ed;border-radius:19px;padding:14px;margin-top:10px}.actions{display:flex;gap:8px;flex-wrap:wrap}.pill{border:1px solid #d8e2eb;background:#fff;color:#10233e;border-radius:13px;padding:10px 12px}.change{border-left:4px solid #d7a941;background:#f7f8fa;padding:9px 10px;border-radius:9px;margin:7px 0}
.stats{display:grid;grid-template-columns:82px 42px 1fr;gap:7px;align-items:center;font-size:13px}.sbar{height:8px;background:#eef2f6;border-radius:99px;overflow:hidden}.sbar i{display:block;height:100%;background:#0b4b7b}.small{font-size:12px;color:#758397;line-height:1.4}.loading{text-align:center;color:#758397;padding:35px}
@media(max-width:430px){.master{width:100vw}}
</style>
</head>
<body>
<section id="home">
 <div class="master" aria-label="NeoDex Startseite">
  <button id="settingsHot" class="hotspot" aria-label="Einstellungen" onclick="settings.showModal()"></button>
  <button id="dexHot" class="hotspot" aria-label="Pokédex" onclick="openDex('all')"></button>
  <button id="routeHot" class="hotspot" aria-label="RouteDex" onclick="alert('RouteDex folgt im nächsten Update.')"></button>
  <button id="caughtHot" class="hotspot" aria-label="Gefangen" onclick="openDex('caught')"></button>
  <button id="favHot" class="hotspot" aria-label="Favoriten" onclick="openDex('fav')"></button>
 </div>
</section>

<section id="dexView">
 <header class="dexTop"><div class="dexBrand"><div><h1>NeoDex</h1><small>HeartGold Generations 2.0</small></div><button class="back" onclick="goHome()">Startseite</button></div></header>
 <main class="dexBody">
  <input id="search" class="search" type="search" placeholder="Deutsch, Englisch oder Nummer suchen …">
  <div class="filters">
   <select id="gen"><option value="">Alle Generationen</option><option value="1">Generation 1</option><option value="2">Generation 2</option><option value="3">Generation 3</option><option value="4">Generation 4</option><option value="5">Generation 5</option><option value="6">Generation 6</option><option value="7">Generation 7</option><option value="8">Generation 8</option><option value="9">Generation 9</option></select>
   <select id="mode"><option value="all">Alle Pokémon</option><option value="changed">HGG-Änderungen</option><option value="seen">Gesehen</option><option value="caught">Gefangen</option><option value="shiny">Shiny</option><option value="fav">Favoriten</option></select>
  </div>
  <div id="grid" class="grid"></div>
 </main>
</section>

<dialog id="detail"><div class="sheetHead"><strong id="sheetTitle">Pokémon</strong><button class="close" onclick="detail.close()">×</button></div><div class="sheet" id="sheetBody"></div></dialog>
<dialog id="settings"><div class="sheetHead"><strong>Dein NeoDex</strong><button class="close" onclick="settings.close()">×</button></div><div class="sheet"><div class="card"><h3>Trainername</h3><input id="trainer" class="search" maxlength="30" placeholder="Wie darf Noctuh dich nennen?"><button class="pill" style="margin-top:10px" onclick="saveTrainer()">Speichern</button></div><div class="card"><h3>Design Freeze</h3><p class="small">Die Startseite verwendet exakt das freigegebene Masterdesign. Neue Funktionen verändern diese Oberfläche nicht.</p></div></div></dialog>

const norm=s=>String(s||"").toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"").replace(/[^a-z0-9♀♂]+/g," ");

function artwork(id){return `https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/${id}.png`}
function changesFor(p){const nd=norm(p.de),ne=norm(p.en);return CHANGES.filter(c=>{const n=norm(c.name);return n.includes(nd)||n.includes(ne)||nd.includes(n)||ne.includes(n)})}

async function getJson(url){const r=await fetch(url);if(!r.ok)throw new Error();return r.json()}
async function loadData(id){if(cache[id])return cache[id];const pk=await getJson(`https://pokeapi.co/api/v2/pokemon/${id}`);const d={stats:pk.stats.map(x=>[x.stat.name,x.base_stat]),abilities:pk.abilities.map(x=>({name:x.ability.name,hidden:x.is_hidden})),height:pk.height/10,weight:pk.weight/10};cache[id]=d;try{localStorage.setItem("neodex-cache-master",JSON.stringify(cache))}catch(e){}return d;}
