<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#061626">
<title>NeoDex</title>
<style>
:root{color-scheme:dark;--bg:#061626;--panel:#0b2945;--text:#f8fbff;--muted:#b6c7d8;--gold:#efc566}
*{box-sizing:border-box}
body{margin:0;min-height:100svh;display:grid;place-items:center;padding:24px;background:radial-gradient(circle at 70% 20%,rgba(78,126,170,.25),transparent 25%),linear-gradient(145deg,#04111e,var(--bg));color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text",system-ui,sans-serif}
main{width:min(100%,460px);padding:32px;border:1px solid rgba(255,255,255,.12);border-radius:30px;background:rgba(11,41,69,.78);box-shadow:0 24px 70px rgba(0,0,0,.35);backdrop-filter:blur(18px);text-align:center}
.owl{width:92px;height:92px;margin:0 auto 18px;display:grid;place-items:center;border:1px solid rgba(255,255,255,.18);border-radius:50%;background:rgba(255,255,255,.06);font-size:52px;animation:breathe 3.8s ease-in-out infinite}
h1{margin:0;font-size:clamp(40px,10vw,62px);letter-spacing:-.05em}
.subtitle{margin:8px 0 28px;color:var(--gold);font-size:16px}
.status{margin:0;color:var(--muted);line-height:1.5}
.loader{width:100%;height:7px;margin-top:24px;overflow:hidden;border-radius:999px;background:rgba(255,255,255,.10)}
.loader::after{content:"";display:block;width:38%;height:100%;border-radius:inherit;background:linear-gradient(90deg,#7cb5e5,#efc566);animation:load 1.3s ease-in-out infinite}
a{display:inline-block;margin-top:22px;color:var(--text);font-weight:700}
@keyframes load{from{transform:translateX(-120%)}to{transform:translateX(360%)}}
@keyframes breathe{0%,100%{transform:translateY(0) rotate(-1deg)}50%{transform:translateY(-4px) rotate(1deg)}}
@media(prefers-reduced-motion:reduce){.owl,.loader::after{animation:none}}
</style>
<script>setTimeout(()=>location.replace("./app/web/"),650)</script>
</head>
<body>
<main>
<div class="owl" aria-hidden="true">🦉</div>
<h1>NeoDex</h1>
<p class="subtitle">HeartGold Generations 2.0</p>
<p class="status">NeoDex wird geöffnet …</p>
<div class="loader" aria-hidden="true"></div>
<noscript><a href="./app/web/">NeoDex öffnen</a></noscript>
</main>
</body>
</html>
